<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Knowledge Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f13; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; }
  .login-box { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; padding: 40px; width: 380px; }
  .login-box h1 { font-size: 22px; margin-bottom: 8px; color: #f1f5f9; }
  .login-box p { font-size: 13px; color: #64748b; margin-bottom: 28px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #0f0f13; border-radius: 8px; padding: 4px; }
  .tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; border-radius: 6px; font-size: 13px; color: #64748b; transition: all 0.2s; }
  .tab.active { background: #2d2d44; color: #f1f5f9; }
  input { width: 100%; padding: 10px 14px; background: #0f0f13; border: 1px solid #2d2d44; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 12px; outline: none; }
  input:focus { border-color: #60A5FA; }
  .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-primary:hover { background: #2563eb; }
  .error-msg { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
  #mainPage { display: none; flex: 1; overflow: hidden; flex-direction: row; }
  .sidebar { width: 260px; background: #1a1a2e; border-right: 1px solid #2d2d44; display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid #2d2d44; flex-shrink: 0; }
  .sidebar-header h2 { font-size: 14px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .btn-new { width: 100%; padding: 8px; background: #1e3a5f; border: 1px solid #2d6bc4; border-radius: 8px; color: #60A5FA; font-size: 13px; cursor: pointer; }
  .btn-new:hover { background: #2d4a6f; }
  .conversations { flex: 1; overflow-y: auto; padding: 8px; }
  .conv-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .conv-item:hover { background: #2d2d44; color: #f1f5f9; }
  .conv-item.active { background: #1e3a5f; color: #60A5FA; }
  .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-del { opacity: 0; font-size: 16px; color: #ef4444; padding: 0 4px; }
  .conv-item:hover .conv-del { opacity: 1; }
  .sidebar-section { padding: 12px; border-top: 1px solid #2d2d44; flex-shrink: 0; }
  .sidebar-section h3 { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .upload-btn { width: 100%; padding: 7px; background: #1a2e1a; border: 1px solid #2d5a2d; border-radius: 8px; color: #4ade80; font-size: 12px; cursor: pointer; margin-bottom: 6px; }
  .upload-btn:hover { background: #243524; }
  .doc-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 6px; font-size: 12px; color: #64748b; }
  .doc-item:hover { background: #2d2d44; }
  .doc-del { color: #ef4444; cursor: pointer; opacity: 0; }
  .doc-item:hover .doc-del { opacity: 1; }
  .prompt-add-btn { width: 100%; padding: 7px; background: #2a1a3e; border: 1px solid #5a2d8a; border-radius: 8px; color: #a78bfa; font-size: 12px; cursor: pointer; margin-bottom: 6px; }
  .prompt-add-btn:hover { background: #3a2a4e; }
  .prompt-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 6px; font-size: 12px; color: #64748b; }
  .prompt-item:hover { background: #2d2d44; }
  .prompt-item.active { background: #2a1a3e; color: #a78bfa; }
  .prompt-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .prompt-del { color: #ef4444; cursor: pointer; opacity: 0; margin-left: 4px; }
  .prompt-item:hover .prompt-del { opacity: 1; }
  .prompt-default-badge { color: #a78bfa; margin-right: 3px; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; padding: 24px; width: 480px; }
  .modal h3 { font-size: 16px; color: #f1f5f9; margin-bottom: 16px; }
  .modal input, .modal textarea { width: 100%; padding: 10px 14px; background: #0f0f13; border: 1px solid #2d2d44; border-radius: 8px; color: #e2e8f0; font-size: 13px; margin-bottom: 10px; outline: none; }
  .modal textarea { resize: vertical; min-height: 100px; font-family: inherit; }
  .modal input:focus, .modal textarea:focus { border-color: #a78bfa; }
  .modal-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; margin-bottom: 16px; }
  .modal-check input[type=checkbox] { width: auto; margin: 0; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 9px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }
  .btn-cancel { background: #2d2d44; color: #94a3b8; }
  .btn-save { background: #7c3aed; color: white; }
  .btn-save:hover { background: #6d28d9; }
  .user-info { padding: 12px 16px; border-top: 1px solid #2d2d44; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #64748b; flex-shrink: 0; }
  .logout-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 12px; }
  .chat-area { flex: 1; display: flex; flex-direction: column; }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid #2d2d44; font-size: 15px; font-weight: 500; color: #f1f5f9; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #1e3a5f; color: #e2e8f0; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #1a1a2e; border: 1px solid #2d2d44; color: #e2e8f0; border-bottom-left-radius: 4px; }
  .msg.loading { color: #64748b; font-style: italic; }
  .chat-input-area { padding: 16px 20px; border-top: 1px solid #2d2d44; display: flex; gap: 10px; }
  .chat-input { flex: 1; padding: 12px 16px; background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 10px; color: #e2e8f0; font-size: 14px; outline: none; resize: none; max-height: 120px; }
  .chat-input:focus { border-color: #3b82f6; }
  .send-btn { padding: 10px 20px; background: #3b82f6; border: none; border-radius: 10px; color: white; cursor: pointer; font-size: 14px; }
  .send-btn:hover { background: #2563eb; }
  .send-btn:disabled { background: #2d2d44; cursor: not-allowed; }
  .no-conv { flex: 1; display: flex; align-items: center; justify-content: center; color: #334155; font-size: 14px; }
  #fileInput { display: none; }
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <h1>AI Knowledge Assistant</h1>
    <p>登入後開始使用 AI 知識庫助手</p>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">登入</div>
      <div class="tab" onclick="switchTab('register')">註冊</div>
    </div>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="密碼" />
    <button class="btn btn-primary" onclick="handleAuth()">登入</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- Prompt 新增 Modal -->
<div class="modal-overlay" id="promptModal">
  <div class="modal">
    <h3>新增 Prompt</h3>
    <input type="text" id="promptName" placeholder="名稱（例如：客服模式）" />
    <textarea id="promptContent" placeholder="System Prompt 內容（例如：你是一位專業的客服人員，語氣要親切...）"></textarea>
    <div class="modal-check">
      <input type="checkbox" id="promptDefault" />
      <label for="promptDefault">設為預設（聊天時自動套用）</label>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePromptModal()">取消</button>
      <button class="btn-save" onclick="savePrompt()">儲存</button>
    </div>
  </div>
</div>

<div id="mainPage">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>對話列表</h2>
      <button class="btn-new" onclick="newConversation()">＋ 新增對話</button>
    </div>
    <div class="conversations" id="convList"></div>

    <div class="sidebar-section">
      <h3>知識庫文件</h3>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">↑ 上傳文件</button>
      <input type="file" id="fileInput" accept=".txt,.pdf" onchange="uploadDoc(this)" />
      <div id="docList"></div>
    </div>

    <div class="sidebar-section">
      <h3>Prompt 管理</h3>
      <button class="prompt-add-btn" onclick="openPromptModal()">＋ 新增 Prompt</button>
      <div id="promptList"></div>
    </div>

    <div class="user-info">
      <span id="userEmail"></span>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="chatTitle">選擇或建立一個對話</div>
    <div class="messages" id="messages">
      <div class="no-conv">← 從左側選擇或建立對話</div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="輸入訊息..." rows="1"
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">送出</button>
    </div>
  </div>
</div>

<script>
const API = 'https://ai-knowledge-assistant-production-815b.up.railway.app';
let token = localStorage.getItem('token');
let currentConvId = null;
let isLogin = true;

if (token) showMain();

function switchTab(tab) {
  isLogin = tab === 'login';
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === isLogin));
  document.querySelector('.btn-primary').textContent = isLogin ? '登入' : '註冊';
}

async function handleAuth() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const url = isLogin ? '/auth/login' : '/auth/register';
  try {
    const res = await fetch(API + url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);
    if (isLogin) {
      token = data.access_token;
      localStorage.setItem('token', token);
      showMain();
    } else {
      switchTab('login');
      showError('註冊成功，請登入');
    }
  } catch (e) { showError(e.message); }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function showMain() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainPage').style.display = 'flex';
  const me = await apiFetch('/auth/me');
  document.getElementById('userEmail').textContent = me.email;
  loadConversations();
  loadDocs();
  loadPrompts();
}

function logout() {
  localStorage.removeItem('token');
  token = null;
  location.reload();
}

async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
  });
  if (!res.ok) throw new Error((await res.json()).detail);
  return res.json();
}

async function loadConversations() {
  const convs = await apiFetch('/conversations/');
  const list = document.getElementById('convList');
  list.innerHTML = convs.map(c => `
    <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="selectConv(${c.id}, '${c.title}')">
      <span class="conv-title">${c.title}</span>
      <span class="conv-del" onclick="event.stopPropagation();delConv(${c.id})">×</span>
    </div>
  `).join('');
}

async function newConversation() {
  const conv = await apiFetch('/conversations/', { method: 'POST', body: JSON.stringify({ title: '新對話' }) });
  await loadConversations();
  selectConv(conv.id, conv.title);
}

async function selectConv(id, title) {
  currentConvId = id;
  document.getElementById('chatTitle').textContent = title;
  const data = await apiFetch(`/conversations/${id}`);
  const msgs = document.getElementById('messages');
  msgs.innerHTML = data.messages.length === 0
    ? '<div class="no-conv">還沒有訊息，開始聊天吧！</div>'
    : data.messages.map(m => `<div class="msg ${m.role}">${m.content}</div>`).join('');
  msgs.scrollTop = msgs.scrollHeight;
  loadConversations();
}

async function delConv(id) {
  await fetch(API + `/conversations/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
  if (currentConvId === id) {
    currentConvId = null;
    document.getElementById('chatTitle').textContent = '選擇或建立一個對話';
    document.getElementById('messages').innerHTML = '<div class="no-conv">← 從左側選擇或建立對話</div>';
  }
  loadConversations();
}

async function sendMessage() {
  if (!currentConvId) return alert('請先選擇或建立對話');
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  const msgs = document.getElementById('messages');
  msgs.querySelector('.no-conv')?.remove();
  msgs.innerHTML += `<div class="msg user">${content}</div>`;

  const aiMsg = document.createElement('div');
  aiMsg.className = 'msg assistant loading';
  aiMsg.textContent = '思考中...';
  msgs.appendChild(aiMsg);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const res = await fetch(API + `/conversations/${currentConvId}/chat/stream`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    aiMsg.classList.remove('loading');
    aiMsg.textContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const text = decoder.decode(value);
      for (const line of text.split('\n')) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          fullText += data;
          aiMsg.textContent = fullText;
          msgs.scrollTop = msgs.scrollHeight;
        }
      }
    }
  } catch (e) {
    aiMsg.textContent = '發生錯誤，請稍後再試';
  }
  document.getElementById('sendBtn').disabled = false;
}

async function loadDocs() {
  const docs = await apiFetch('/documents/');
  const list = document.getElementById('docList');
  list.innerHTML = docs.map(d => `
    <div class="doc-item">
      <span>📄 ${d.filename}</span>
      <span class="doc-del" onclick="delDoc(${d.id})">×</span>
    </div>
  `).join('') || '<div style="font-size:12px;color:#334155;padding:4px 8px">還沒有文件</div>';
}

async function uploadDoc(input) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  await fetch(API + '/documents/', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` },
    body: formData
  });
  input.value = '';
  loadDocs();
}

async function delDoc(id) {
  await fetch(API + `/documents/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
  loadDocs();
}

async function loadPrompts() {
  const prompts = await apiFetch('/prompts/');
  const list = document.getElementById('promptList');
  if (prompts.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:#334155;padding:4px 8px">還沒有 Prompt</div>';
    return;
  }
  list.innerHTML = prompts.map(p => `
    <div class="prompt-item ${p.is_default ? 'active' : ''}" title="${p.content}">
      <span class="prompt-name">
        ${p.is_default ? '<span class="prompt-default-badge">★</span>' : ''}${p.name}
      </span>
      <span class="prompt-del" onclick="delPrompt(${p.id})">×</span>
    </div>
  `).join('');
}

function openPromptModal() {
  document.getElementById('promptName').value = '';
  document.getElementById('promptContent').value = '';
  document.getElementById('promptDefault').checked = false;
  document.getElementById('promptModal').classList.add('show');
}

function closePromptModal() {
  document.getElementById('promptModal').classList.remove('show');
}

async function savePrompt() {
  const name = document.getElementById('promptName').value.trim();
  const content = document.getElementById('promptContent').value.trim();
  const is_default = document.getElementById('promptDefault').checked;
  if (!name || !content) return alert('名稱和內容不能為空');
  await apiFetch('/prompts/', {
    method: 'POST',
    body: JSON.stringify({ name, content, is_default })
  });
  closePromptModal();
  loadPrompts();
}

async function delPrompt(id) {
  await fetch(API + `/prompts/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
  loadPrompts();
}
</script>
</body>
</html>
